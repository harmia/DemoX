<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EV Spot Charging Scheduler</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #2563eb;
        --accent-soft: #bfdbfe;
        --border: #e2e8f0;
      }
      [data-theme="dark"] {
        --bg: #0b1220;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #60a5fa;
        --accent-soft: #1e3a8a;
        --border: #1f2937;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }
      form {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 0.9rem;
        color: var(--muted);
      }
      input, select, button {
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 10px;
      }
      button {
        cursor: pointer;
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 600;
      }
      .chart {
        margin-top: 16px;
        display: grid;
        gap: 6px;
        align-items: end;
        height: 230px;
      }
      .bar {
        border-radius: 8px 8px 4px 4px;
        background: var(--accent-soft);
        position: relative;
      }
      .bar.selected { background: #16a34a; }
      .bar span {
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        color: var(--muted);
      }
      .summary {
        margin-top: 12px;
        padding: 12px;
        border-radius: 10px;
        background: rgba(37, 99, 235, 0.08);
      }
      .error { color: #dc2626; margin-top: 8px; }
      .muted { color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>EV Spot Charging Scheduler</h1>
        <button id="themeToggle" type="button">Toggle dark mode</button>
      </div>

      <div class="card">
        <form id="scheduleForm">
          <label>Earliest start
            <input id="earliestStart" type="datetime-local" required />
          </label>
          <label>Latest end
            <input id="latestEnd" type="datetime-local" required />
          </label>
          <label>Target mode
            <select id="targetMode">
              <option value="hours">Duration (hours)</option>
              <option value="energy">Energy (kWh)</option>
            </select>
          </label>
          <label id="durationLabel">Required duration (hours)
            <input id="requiredHours" type="number" min="1" max="24" value="4" step="0.5" />
          </label>
          <label id="energyLabel" style="display:none;">Required energy (kWh)
            <input id="requiredEnergyKWh" type="number" min="1" step="0.1" value="44" />
          </label>
          <label>Charging power (kW)
            <input id="chargingPowerKw" type="number" min="1" step="0.1" value="11" />
          </label>
          <label>Optional max price (€/MWh)
            <input id="maxPriceEurPerMWh" type="number" min="0" step="0.1" placeholder="e.g. 90" />
          </label>
          <label>Price granularity
            <select id="priceResolution">
              <option value="hourly">Hourly</option>
              <option value="15min">15-minute</option>
            </select>
          </label>
          <button type="submit">Calculate cheapest charging slots</button>
        </form>
        <p class="muted">Mock prices now; pricing provider is isolated in backend for easy real Nord Pool integration later.</p>
        <div id="error" class="error"></div>
      </div>

      <div class="card" style="margin-top: 16px;">
        <h2>Spot prices (next 24h)</h2>
        <label id="detailToggleWrap" class="muted" style="display:none; margin-top: 8px;">
          <input id="show15MinDetail" type="checkbox" />
          Show 15-minute detail
        </label>
        <div id="chart" class="chart"></div>
        <div id="summary" class="summary">No schedule calculated yet.</div>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
